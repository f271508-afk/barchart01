!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>00案工程專案進度</title>
  <!-- Tailwind & XLSX CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    /* 自訂樣式 */
    .gantt-bar-container {
      position: relative;
      height: 26px;
      background: #f3f4f6;
      border-radius: 6px;
      overflow: visible;
      border: 1px solid #d1d5db;
      width: 100%;
      min-width: 200px;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
    }
    .gantt-bar {
      height: 100%;
      border-radius: 6px;
      position: absolute;
      top: 0;
      background: #3b82f6;
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      box-shadow: 0 1px 3px rgba(37, 99, 235, 0.3);
      transition: width 0.1s, left 0.1s;
    }
    .gantt-bar-summary {
      background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
      box-shadow: 0 1px 4px rgba(124, 58, 237, 0.4);
      border: 1px solid rgba(124, 58, 237, 0.2);
    }
    .handle {
      position: absolute;
      top: -4px;
      width: 16px;
      height: 34px;
      cursor: ew-resize;
      z-index: 10;
      border-radius: 4px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(2px);
      border: 1px solid rgba(0,0,0,0.12);
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #1f2937;
    }
    .handle:hover { 
      transform: scale(1.12);
      box-shadow: 0 4px 10px rgba(0,0,0,0.18);
    }
    .handle-left { 
      left: -8px; 
      background: #fbbf24; 
      border-color: #d97706;
    }
    .handle-right { 
      right: -8px; 
      background: #f87171; 
      border-color: #dc2626;
    }
    .handle-left::after {
      content: "◀";
      font-size: 14px;
      color: #78350f;
      line-height: 1;
      text-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    .handle-right::after {
      content: "▶";
      font-size: 14px;
      color: #7f1d1d;
      line-height: 1;
      text-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }

    input, select {
      background: transparent;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 4px 6px;
      width: 100%;
      font-size: 0.9rem;
    }
    input:focus, select:focus { outline: 2px solid #3b82f6; outline-offset: 1px; }

    /* 刻度單元格：完全無邊框，僅保留底部細線 */
    .date-cell {
      text-align: center;
      font-size: 10px;
      flex-shrink: 0;
      box-sizing: border-box;
      height: 20px;
      border-bottom: 1px solid #e5e7eb;
      border-left: none;
      border-right: none;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 2px;
    }
    .scale-highlight {
      background: #eff6ff;
      font-weight: 600;
      color: #1d4ed8;
      border-radius: 2px;
    }
    .dragging { opacity: 0.4; background: #bfdbfe; }

    /* 列印優化 */
    @media print {
      body { background: white; padding: 0.5in; }
      .no-print { display: none !important; }
      .max-w-7xl { max-width: 100%; box-shadow: none; padding: 0.2in; }
      .overflow-x-auto { overflow-x: visible !important; }
      table { width: 100% !important; }
      .gantt-bar-container { border: 1px solid #aaa; }
      .handle { display: none !important; }
    }

    /* 表格美化 */
    th { background: #f9fafb; font-weight: 600; }
    tr:last-child { border-bottom: none; }
    td { vertical-align: middle; padding: 8px 6px; }
    .task-name-input { 
      border: none; 
      background: transparent; 
      font-weight: 500; 
      width: 100%;
      min-width: 80px;
      box-sizing: border-box;
    }
    .task-name-input:focus { 
      background: white; 
      border: 1px solid #3b82f6; 
      border-radius: 4px; 
    }

    /* 工程階段欄位 - 最適欄寬 */
    .task-name-col {
      width: 1%;
      white-space: nowrap;
      min-width: 120px;
    }
    .task-name-col .task-name-input {
      min-width: 100px;
      width: auto;
    }
    th.task-name-col {
      width: 1%;
      white-space: nowrap;
      min-width: 120px;
    }

    /* 總工程進度列樣式 */
    .summary-row {
      background: #f5f3ff;
      border-bottom: 2px solid #8b5cf6;
      font-weight: 600;
    }
    .summary-row td {
      padding-top: 10px;
      padding-bottom: 10px;
    }
    .summary-row .task-name-input {
      font-weight: 700;
      color: #5b21b6;
      min-width: 120px;
    }
    .summary-row input[type="date"] {
      font-weight: 600;
      color: #5b21b6;
      background: #ede9fe;
      border-color: #c4b5fd;
    }

    /* 刪除按鈕 */
    .delete-btn {
      background: #fee2e2;
      color: #b91c1c;
      border: none;
      border-radius: 30px;
      width: 28px;
      height: 28px;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .delete-btn:hover {
      background: #fecaca;
      transform: scale(1.08);
      color: #991b1b;
    }
    .delete-btn:active { transform: scale(0.95); }

    /* 標題樣式 */
    .page-title-input {
      font-size: 2.4rem !important;
      font-weight: 800;
      color: #1e293b;
      border: none;
      background: transparent;
      padding: 4px 8px;
      width: 100%;
      min-width: 300px;
      letter-spacing: 0.02em;
    }
    .page-title-input:focus {
      outline: 2px solid #3b82f6;
      outline-offset: 2px;
      border-radius: 8px;
      background: white;
    }
    .page-title-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }
    .page-title-wrapper .badge {
      font-size: 0.75rem;
      background: #e2e8f0;
      color: #475569;
      padding: 2px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* 日期欄位寬度最佳化 */
    .date-col {
      width: 1%;
      white-space: nowrap;
      min-width: 160px;
    }
    .date-col input[type="date"] {
      min-width: 120px;
      width: 100%;
    }
    .duration-col {
      width: 1%;
      white-space: nowrap;
      min-width: 60px;
      text-align: center;
    }
    .drag-col, .delete-col {
      width: 1%;
      white-space: nowrap;
      min-width: 40px;
      text-align: center;
    }

    /* 工具列左側邊界最小化 */
    .toolbar-left {
      margin-left: 0;
      padding-left: 0;
    }
    .toolbar-left .page-title-wrapper {
      margin-left: 0;
      padding-left: 0;
    }
    .toolbar-left .page-title-input {
      padding-left: 0;
    }

    /* JSON 按鈕特殊色 */
    .json-btn {
      background: #6366f1;
    }
    .json-btn:hover {
      background: #4f46e5;
    }
    .json-import-btn {
      background: #8b5cf6;
    }
    .json-import-btn:hover {
      background: #7c3aed;
    }
  </style>
</head>
<body class="bg-gray-50 p-4 md:p-6 antialiased">
  <div class="max-w-7xl mx-auto bg-white rounded-xl shadow-lg p-4 md:p-6 transition-all">

    <!-- 標題列 + 工具列 -->
    <div class="flex flex-wrap justify-between items-center gap-3 mb-5 no-print toolbar-left">
      <div class="page-title-wrapper">
        <input type="text" value="00案工程專案進度" class="page-title-input" id="projectTitle" 
               placeholder="輸入專案名稱" spellcheck="false">
        <span class="badge">可編修</span>
      </div>
      <div class="flex flex-wrap items-center gap-2">
        <!-- 匯出 XLSX -->
        <button onclick="exportToExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-sm transition flex items-center gap-1">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
          匯出 XLSX
        </button>
        <!-- 匯出 JSON -->
        <button onclick="exportJSON()" class="json-btn hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-sm transition flex items-center gap-1">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
          匯出 JSON
        </button>
        <!-- 匯入 JSON -->
        <button onclick="document.getElementById('jsonInput').click()" class="json-import-btn hover:bg-purple-700 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-sm transition flex items-center gap-1">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
          匯入 JSON
        </button>
        <input type="file" id="jsonInput" accept=".json" style="display:none" onchange="importJSON(event)">
        <!-- 匯出 PDF -->
        <button onclick="window.print()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-sm transition flex items-center gap-1">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
          匯出 PDF
        </button>
        <select id="scale-selector" onchange="renderTable()" class="w-28 border-gray-300 rounded-lg py-2 px-2 text-sm bg-gray-50 shadow-sm">
          <option value="week">📅 週</option>
          <option value="biweekly">📅 雙週</option>
          <option value="month" selected>📅 月</option>
        </select>
        <button onclick="addTask()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-sm transition flex items-center gap-1">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
          新增階段
        </button>
      </div>
    </div>

    <!-- 表格容器 -->
    <div class="overflow-x-auto border border-gray-200 rounded-xl shadow-sm">
      <table class="w-full border-collapse text-sm">
        <thead class="bg-gray-50/80 text-gray-700 border-b border-gray-200">
          <tr>
            <th class="p-3 drag-col no-print text-center text-gray-400">↕</th>
            <th class="p-3 task-name-col text-left font-semibold">工程階段</th>
            <th class="p-3 date-col text-left font-semibold">起日 – 訖日</th>
            <th class="p-3 duration-col text-center font-semibold">工期</th>
            <th class="p-3 min-w-[300px]">
              <div id="date-scale" class="flex flex-col text-[10px] font-bold text-gray-600"></div>
            </th>
            <th class="p-3 delete-col no-print text-center">✕</th>
          </tr>
        </thead>
        <tbody id="gantt-body"></tbody>
      </table>
    </div>

    <!-- 底部資訊 -->
    <div class="mt-4 text-xs text-gray-400 flex justify-between no-print border-t pt-3">
      <span>拖曳左右箭頭調整日期 · 拖曳行可排序</span>
      <span>⚡ 支援 JSON 匯出/匯入 (含表頭)</span>
    </div>
  </div>

  <script>
    // ----- 資料 (初始範例) -----
    let tasks = [
      { name: "專案規劃與設計", start: "2026-07-08", end: "2026-07-31" },
      { name: "基礎開挖與地基工程", start: "2026-08-01", end: "2026-09-15" },
      { name: "主體結構工程", start: "2026-09-16", end: "2026-10-10" },
      { name: "外牆裝修", start: "2026-10-11", end: "2026-10-23" }
    ];

    let draggedIndex = null;

    // ===== JSON 匯出 (含表頭) =====
    function exportJSON() {
      const title = document.getElementById('projectTitle').value || '工程專案進度';
      const data = {
        projectTitle: title,
        tasks: tasks
      };
      const jsonStr = JSON.stringify(data, null, 2);
      const blob = new Blob([jsonStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${title}_${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // ===== JSON 匯入 (含表頭) =====
    function importJSON(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const json = JSON.parse(e.target.result);
          // 檢查格式：必須有 projectTitle 和 tasks
          if (json.projectTitle !== undefined && Array.isArray(json.tasks)) {
            // 更新表頭
            document.getElementById('projectTitle').value = json.projectTitle;
            // 更新任務資料
            tasks = json.tasks;
            renderTable();
            alert('✅ JSON 匯入成功！');
          } else {
            alert('❌ JSON 格式錯誤：缺少 projectTitle 或 tasks 陣列');
          }
        } catch(err) {
          alert('❌ JSON 解析失敗：' + err.message);
        }
      };
      reader.readAsText(file);
      // 重置 input 以便重複選取相同檔案
      event.target.value = '';
    }

    // ===== 匯出 Excel (XLSX) - 包含表頭標題 =====
    function exportToExcel() {
      const summary = getSummary();
      const title = document.getElementById('projectTitle').value || '工程專案進度';
      
      const data = [
        { '序號': title, '工程階段': '', '開始日期': '', '結束日期': '', '工期 (天)': '' },
        { '序號': '總', '工程階段': '總工程進度', '開始日期': summary.start, '結束日期': summary.end, '工期 (天)': summary.duration }
      ];
      tasks.forEach((t, i) => {
        data.push({
          '序號': i + 1,
          '工程階段': t.name,
          '開始日期': t.start,
          '結束日期': t.end,
          '工期 (天)': Math.round((new Date(t.end) - new Date(t.start)) / (1000 * 60 * 60 * 24)) + 1
        });
      });

      const ws = XLSX.utils.json_to_sheet(data);
      ws['!cols'] = [
        { wch: 12 },  // 序號
        { wch: 30 },  // 工程階段
        { wch: 16 },  // 開始日期
        { wch: 16 },  // 結束日期
        { wch: 12 }   // 工期
      ];
      ws['!merges'] = [
        { s: { r: 0, c: 0 }, e: { r: 0, c: 4 } }
      ];

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "工程進度");
      XLSX.writeFile(wb, `${title}_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    // ----- 計算全域日期範圍 -----
    function getGlobalRange() {
      if (!tasks.length) return { min: new Date(), max: new Date() };
      const dates = tasks.flatMap(t => [new Date(t.start), new Date(t.end)]);
      return { min: new Date(Math.min(...dates)), max: new Date(Math.max(...dates)) };
    }

    // ----- 計算總工程進度 (最早起日 & 最晚訖日) -----
    function getSummary() {
      if (!tasks.length) return { start: '', end: '', duration: 0 };
      let earliestStart = new Date(tasks[0].start);
      let latestEnd = new Date(tasks[0].end);
      tasks.forEach(t => {
        const s = new Date(t.start);
        const e = new Date(t.end);
        if (s < earliestStart) earliestStart = s;
        if (e > latestEnd) latestEnd = e;
      });
      const startStr = earliestStart.toISOString().split('T')[0];
      const endStr = latestEnd.toISOString().split('T')[0];
      const duration = Math.round((latestEnd - earliestStart) / (1000 * 60 * 60 * 24)) + 1;
      return { start: startStr, end: endStr, duration: duration };
    }

    // ----- 刪除任務 (根據索引，但總工程進度不可刪) -----
    function deleteTask(index) {
      if (index === 0) {
        alert('總工程進度為自動彙整，無法刪除。');
        return;
      }
      const taskIndex = index - 1;
      if (tasks.length <= 1) {
        alert('至少保留一個工程階段。');
        return;
      }
      if (confirm(`確定要刪除「${tasks[taskIndex].name}」嗎？`)) {
        tasks.splice(taskIndex, 1);
        renderTable();
      }
    }

    // ----- 核心渲染 -----
    function renderTable() {
      const range = getGlobalRange();
      const totalDays = Math.max(1, Math.ceil((range.max - range.min) / (1000 * 60 * 60 * 24)) + 1);
      const mode = document.getElementById('scale-selector').value;

      // 1. 繪製刻度
      const scaleDiv = document.getElementById('date-scale');
      scaleDiv.innerHTML = '';
      const yearRow = document.createElement('div'); yearRow.className = "flex";
      const monthRow = document.createElement('div'); monthRow.className = "flex";
      const dayRow = document.createElement('div'); dayRow.className = "flex";
      const cellWidth = 100 / totalDays;

      let current = new Date(range.min);
      while (current <= range.max) {
        const dayNum = current.getDate();
        let isTarget = false;
        if (mode === 'week') isTarget = [1, 8, 15, 22, 29].includes(dayNum);
        else if (mode === 'biweekly') isTarget = [1, 15].includes(dayNum);
        else if (mode === 'month') isTarget = (dayNum === 1);

        const daySpan = document.createElement('span');
        daySpan.className = `date-cell ${isTarget ? 'scale-highlight' : ''}`;
        daySpan.style.width = cellWidth + '%';
        daySpan.textContent = isTarget ? dayNum : '';
        dayRow.appendChild(daySpan);

        if (dayNum === 1 || current.getTime() === range.min.getTime()) {
          const monthSpan = document.createElement('span');
          monthSpan.className = "date-cell bg-gray-50 font-medium";
          monthSpan.style.width = cellWidth + '%';
          monthSpan.textContent = current.getMonth() + 1;
          monthRow.appendChild(monthSpan);
        } else {
          const spacer = document.createElement('span');
          spacer.className = "date-cell";
          spacer.style.width = cellWidth + '%';
          monthRow.appendChild(spacer);
        }

        if ((current.getMonth() === 0 && dayNum === 1) || current.getTime() === range.min.getTime()) {
          const yearSpan = document.createElement('span');
          yearSpan.className = "date-cell bg-gray-100 font-semibold";
          yearSpan.style.width = cellWidth + '%';
          yearSpan.textContent = current.getFullYear();
          yearRow.appendChild(yearSpan);
        } else {
          const spacer = document.createElement('span');
          spacer.className = "date-cell";
          spacer.style.width = cellWidth + '%';
          yearRow.appendChild(spacer);
        }

        current.setDate(current.getDate() + 1);
      }
      scaleDiv.appendChild(yearRow);
      scaleDiv.appendChild(monthRow);
      scaleDiv.appendChild(dayRow);

      // 2. 繪製任務列
      const tbody = document.getElementById('gantt-body');
      tbody.innerHTML = '';

      // 2.1 總工程進度
      const summary = getSummary();
      const summaryStart = new Date(summary.start);
      const summaryEnd = new Date(summary.end);
      const summaryDuration = summary.duration;
      const summaryOffset = Math.max(0, (summaryStart - range.min) / (1000 * 60 * 60 * 24));
      const summaryWidth = Math.min(100, (summaryDuration / totalDays) * 100);
      const summaryLeft = (summaryOffset / totalDays) * 100;

      const summaryTr = document.createElement('tr');
      summaryTr.className = "summary-row border-b";
      summaryTr.draggable = false;
      summaryTr.innerHTML = `
        <td class="p-2 drag-col no-print text-center text-gray-300 text-lg select-none">★</td>
        <td class="p-2 task-name-col"><input type="text" value="總工程進度" class="task-name-input w-full font-bold text-purple-700" readonly style="background:transparent;cursor:default;"></td>
        <td class="p-2 date-col">
          <div class="flex flex-col gap-1">
            <input type="date" value="${summary.start}" class="w-full" readonly style="background:#ede9fe;cursor:default;font-weight:600;color:#5b21b6;">
            <input type="date" value="${summary.end}" class="w-full" readonly style="background:#ede9fe;cursor:default;font-weight:600;color:#5b21b6;">
          </div>
        </td>
        <td class="p-2 duration-col text-center font-mono font-bold text-purple-700">${summaryDuration} 天</td>
        <td class="p-2 relative">
          <div class="gantt-bar-container">
            <div class="gantt-bar gantt-bar-summary" style="left:${Math.min(99.5, summaryLeft)}%; width:${Math.min(99.5, summaryWidth)}%;">
              <div class="handle handle-left no-print" onmousedown="startDragSummary(event, 'start')" title="拖曳調整總工程開始日"></div>
              <div class="handle handle-right no-print" onmousedown="startDragSummary(event, 'end')" title="拖曳調整總工程結束日"></div>
            </div>
          </div>
        </td>
        <td class="p-2 delete-col no-print text-center text-gray-300 text-sm">—</td>
      `;
      tbody.appendChild(summaryTr);

      // 2.2 各階段任務
      tasks.forEach((task, i) => {
        const tr = document.createElement('tr');
        tr.className = "border-b border-gray-100 hover:bg-blue-50/30 transition-colors";
        tr.draggable = true;
        tr.ondragstart = (e) => { draggedIndex = i; e.target.classList.add('dragging'); };
        tr.ondragend = (e) => e.target.classList.remove('dragging');
        tr.ondragover = (e) => e.preventDefault();
        tr.ondrop = (e) => {
          const target = i;
          const moved = tasks.splice(draggedIndex, 1)[0];
          tasks.splice(target, 0, moved);
          renderTable();
        };

        const start = new Date(task.start);
        const end = new Date(task.end);
        const duration = Math.round((end - start) / (1000 * 60 * 60 * 24)) + 1;
        const offsetDays = Math.max(0, (start - range.min) / (1000 * 60 * 60 * 24));
        const widthPercent = Math.min(100, (duration / totalDays) * 100);
        const leftPercent = (offsetDays / totalDays) * 100;

        const rowIndex = i + 1;
        tr.innerHTML = `
          <td class="p-2 drag-col no-print text-center text-gray-300 cursor-grab text-lg leading-none select-none">☰</td>
          <td class="p-2 task-name-col"><input type="text" value="${task.name}" class="task-name-input w-full" onchange="updateTask(${i}, 'name', this.value)"></td>
          <td class="p-2 date-col">
            <div class="flex flex-col gap-1">
              <input type="date" value="${task.start}" class="w-full" onchange="updateTask(${i}, 'start', this.value)">
              <input type="date" value="${task.end}" class="w-full" onchange="updateTask(${i}, 'end', this.value)">
            </div>
          </td>
          <td class="p-2 duration-col text-center font-mono font-medium">${duration} 天</td>
          <td class="p-2 relative">
            <div class="gantt-bar-container">
              <div class="gantt-bar" style="left:${Math.min(99.5, leftPercent)}%; width:${Math.min(99.5, widthPercent)}%;">
                <div class="handle handle-left no-print" onmousedown="startDrag(event, ${i}, 'start')" title="拖曳調整開始日"></div>
                <div class="handle handle-right no-print" onmousedown="startDrag(event, ${i}, 'end')" title="拖曳調整結束日"></div>
              </div>
            </div>
          </td>
          <td class="p-2 delete-col no-print text-center">
            <button class="delete-btn" onclick="deleteTask(${rowIndex})" title="刪除此階段">✕</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    // ----- 更新任務欄位 -----
    function updateTask(index, field, value) {
      if (field === 'name') tasks[index].name = value;
      else if (field === 'start' || field === 'end') {
        const newDate = new Date(value);
        if (!isNaN(newDate)) tasks[index][field] = value;
      }
      renderTable();
    }

    // ----- 拖曳調整日期 (Handle) -----
    function startDrag(e, index, type) {
      e.stopPropagation();
      e.preventDefault();
      let startX = e.clientX;
      const range = getGlobalRange();
      const totalDays = Math.max(1, (range.max - range.min) / (1000 * 60 * 60 * 24) + 1);
      
      const container = document.querySelector('.gantt-bar-container');
      if (!container) return;
      const containerWidth = container.offsetWidth || 300;

      const onDrag = (moveEvent) => {
        const deltaX = moveEvent.clientX - startX;
        const deltaDays = Math.round(deltaX / (containerWidth / totalDays));
        if (deltaDays !== 0) {
          let d = new Date(tasks[index][type]);
          d.setDate(d.getDate() + deltaDays);
          if (!isNaN(d)) {
            tasks[index][type] = d.toISOString().split('T')[0];
            startX = moveEvent.clientX;
            renderTable();
          }
        }
      };
      const onUp = () => {
        window.removeEventListener('mousemove', onDrag);
      };
      window.addEventListener('mousemove', onDrag);
      window.addEventListener('mouseup', onUp, { once: true });
    }

    // ----- 拖曳調整總工程進度 (Summary) -----
    function startDragSummary(e, type) {
      e.stopPropagation();
      e.preventDefault();
      let startX = e.clientX;
      const range = getGlobalRange();
      const totalDays = Math.max(1, (range.max - range.min) / (1000 * 60 * 60 * 24) + 1);
      
      const container = document.querySelector('.gantt-bar-container');
      if (!container) return;
      const containerWidth = container.offsetWidth || 300;

      const onDrag = (moveEvent) => {
        const deltaX = moveEvent.clientX - startX;
        const deltaDays = Math.round(deltaX / (containerWidth / totalDays));
        if (deltaDays !== 0) {
          if (type === 'start') {
            tasks.forEach(t => {
              let d = new Date(t.start);
              d.setDate(d.getDate() + deltaDays);
              if (!isNaN(d)) t.start = d.toISOString().split('T')[0];
            });
          } else if (type === 'end') {
            tasks.forEach(t => {
              let d = new Date(t.end);
              d.setDate(d.getDate() + deltaDays);
              if (!isNaN(d)) t.end = d.toISOString().split('T')[0];
            });
          }
          startX = moveEvent.clientX;
          renderTable();
        }
      };
      const onUp = () => {
        window.removeEventListener('mousemove', onDrag);
      };
      window.addEventListener('mousemove', onDrag);
      window.addEventListener('mouseup', onUp, { once: true });
    }

    // ----- 新增任務 -----
    function addTask() {
      const last = tasks.length ? tasks[tasks.length - 1] : null;
      let start = last ? last.start : "2026-07-08";
      let end = last ? last.end : "2026-07-20";
      if (last) {
        const s = new Date(last.start);
        const e = new Date(last.end);
        const offset = Math.round((e - s) / (1000 * 60 * 60 * 24)) + 7;
        const newStart = new Date(e);
        newStart.setDate(e.getDate() + 2);
        start = newStart.toISOString().split('T')[0];
        const newEnd = new Date(newStart);
        newEnd.setDate(newStart.getDate() + Math.min(offset, 14));
        end = newEnd.toISOString().split('T')[0];
      }
      tasks.push({ name: `新工程 (${tasks.length+1})`, start: start, end: end });
      renderTable();
      const tbody = document.getElementById('gantt-body');
      if (tbody) tbody.lastElementChild?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // 初始化
    renderTable();
  </script>
</body>
</html>
